<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CRUD.css">
    <title>CRUD - Local Storage</title>
</head>
<body>
   <header class="navbar">
  <h1 class="txt-title">Finance Tracker</h1>
</header>
<div class="sidebar"></div>
<div class="boxes">
  <div class="box1" id="box">
      <h3>Amount</h3>
      <input class="income-input" placeholder="Enter the amount" type="number"  id="amount" required>
      <input type="date" name="" id="date" required>
      <h3>Type</h3>
      <div class="grid">
        <select class="type-select" id="type">
          <option value="income" id="income">Income</option>
          <option value="expense"id="expenses">Expense</option>
        </select>
      </div>
      <h3>Description</h3>
      <select class="type-select" id="description">
        <option value="none"></option>
          <option value="Transportation">Transporation</option>
          <option value="Utilities">Utilities</option>
          <option value="Food">Food</option>
          <option value="Shopping">Shopping</option>
          <option value="work" id="work">Work</option>
          <option value="Investment">Investments</option>
          <option value="Savings">Savings/Ipon</option>
          <option value="allowance">Allowance</option>
      </select>
     
     <div class="grid">
      <h3>Balance: </h3>
      <p id="balanceText"></p>
      <button class="submitbtn"  id="submitbtn">Submit</button>
     </div> 
    </div>
  <div class="containers">
   <div class="box4" id="box">
      <div class="pie">
        <canvas id="myChart" class="chart" width="400" height="200"></canvas>
      </div>
   </div>
    <div class="box5" id="box">
        <canvas id="polarChart" class="chart" width="400" height="200"></canvas>
    </div>
  </div>
</div>

<div class="box6" id="box">
      <h2 class="Transactions">Transactions</h2>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Amount</th>
            <th>description</th>
          </tr>
        </thead>
        <tbody class="tbody" id="TransactionBody">
          
        </tbody>
      </table>
</div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="CRUD.js"></script>
</body>
</html>
